version: "3.8"

# =============================================================================
# VelesDB Benchmarks — ALL engines in Docker (fair conditions)
#
# Usage:
#   docker compose build velesdb    # Build VelesDB from source
#   docker compose up -d            # Start all engines
#   docker compose ps               # Check health
# =============================================================================

services:
  velesdb:
    build:
      context: ../velesdb-core
      dockerfile: Dockerfile
    container_name: bench-velesdb
    ports:
      - "8080:8080"
    volumes:
      - velesdb_data:/data
    environment:
      - VELESDB_HOST=0.0.0.0
      - VELESDB_PORT=8080
      - VELESDB_DATA_DIR=/data
      - VELESDB_NO_UPDATE_CHECK=1
      - RUST_LOG=warn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: bench-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - /tmp:/var/lib/clickhouse/user_files
    environment:
      - CLICKHOUSE_DB=benchmark
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: bench-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  memgraph:
    image: memgraph/memgraph:2.21.1
    container_name: bench-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    entrypoint:
      - memgraph
      - --bolt-port=7687
      - --also-log-to-stderr
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  velesdb_data:
  clickhouse_data:
  qdrant_data:
  memgraph_data:
